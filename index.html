<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Senhas</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <div class="card">

      <div class="header">
        <img src="unlock.svg" alt="Ícone" class="icon">
        <h1>Gerador de Senhas</h1>
      </div>

      <div class="password-box">
        <span id="password">Clique em gerar</span>
      </div>

      <div class="strength">
        <div class="bar-bg">
          <div id="bar-fill"></div>
        </div>
        <span id="strength-text">Força da senha</span>
      </div>

      <div class="controls">

        <div class="length-control">
          <button id="decrease">-</button>
          <input type="number" id="length" min="8" max="32" value="12"/>
          <button id="increase">+</button>
        </div>

        <div class="options">
          <label><input type="checkbox" id="uppercase" checked> Maiúsculas</label>
          <label><input type="checkbox" id="lowercase" checked> Minúsculas</label>
          <label><input type="checkbox" id="numbers" checked> Números</label>
          <label><input type="checkbox" id="symbols" checked> Símbolos</label>
        </div>

        <button id="generate">Gerar Senha</button>

      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
